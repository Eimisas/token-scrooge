name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            asset_name: scrooge-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: scrooge-macos-aarch64
          - os: macos-13
            target: x86_64-apple-darwin
            asset_name: scrooge-macos-x86_64

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y musl-tools g++

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            scrooge/target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('scrooge/Cargo.lock') }}
          restore-keys: ${{ matrix.target }}-cargo-

      - name: Build release binary
        working-directory: scrooge
        env:
          CXX_x86_64_unknown_linux_musl: g++
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: |
          cp scrooge/target/${{ matrix.target }}/release/scrooge ${{ matrix.asset_name }}

      - name: Upload to release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
          generate_release_notes: true
